name: Sync with Upstream

on:
  schedule:
    - cron: '0 2 * * *'      # 每天北京时间早上 10 点自动运行（可自行调整）
  workflow_dispatch:         # 允许你手动点击运行

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync upstream changes
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.3   # ← 这里改成最新版
        with:
          upstream_repository: R6410418/Jackrong-llm-finetuning-guide
          upstream_branch: main
          target_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
